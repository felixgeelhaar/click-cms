      description: REST API for headless content access. Default API endpoints for pages, content, users. Plugins can extend with custom endpoints.
      requirements: []
    - id: admin-ui-plugin
      title: Admin UI Plugin
      description: Optional admin panel plugin for non-engineers to manage content, plugins, and settings. Easy deployment via admin UI.
      requirements: []
    - id: plugin-marketplace
      title: Plugin Marketplace
      description: Easy plugin discovery and installation. ZIP upload, marketplace browse, auto-updates for plugins.
